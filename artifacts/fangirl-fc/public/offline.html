<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Fangirl FC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0b0613;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #f472b6, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      font-size: 15px;
      color: rgba(255,255,255,0.55);
      line-height: 1.6;
      max-width: 300px;
      margin-bottom: 32px;
    }
    a {
      display: inline-block;
      background: linear-gradient(135deg, #ec4899, #8b5cf6);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      padding: 14px 32px;
      border-radius: 999px;
      text-decoration: none;
    }
    a:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="logo">⚽</div>
  <h1>Fangirl FC</h1>
  <p>You are offline. Please reconnect to use Fangirl FC.</p>
  <a href="/">Try again</a>
</body>
</html>
